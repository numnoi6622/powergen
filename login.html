<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - จัดการคำสั่งซื้อ</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
        <div class="bg-slate-900 p-8 text-center">
            <div class="w-16 h-16 bg-white/10 rounded-full flex items-center justify-center mx-auto mb-4 text-white text-2xl">
                <i class="fa-solid fa-lock"></i>
            </div>
            <h1 class="text-2xl font-bold text-white mb-2">เข้าสู่ระบบหลังบ้าน</h1>
            <p class="text-slate-400 text-sm">เฉพาะผู้ดูแลระบบเท่านั้น</p>
        </div>

        <div class="p-8">
            <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">ชื่อผู้ใช้ (Username)</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                            <i class="fa-solid fa-user"></i>
                        </div>
                        <input type="text" id="username" required class="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="กรอกชื่อผู้ใช้">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">รหัสผ่าน (Password)</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                            <i class="fa-solid fa-key"></i>
                        </div>
                        <input type="password" id="password" required class="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="กรอกรหัสผ่าน">
                    </div>
                </div>
                
                <div id="errorMsg" class="hidden bg-red-50 text-red-600 text-sm p-3 rounded-lg flex items-center gap-2">
                    <i class="fa-solid fa-circle-exclamation"></i> <span>ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</span>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-blue-500/30 transition transform hover:-translate-y-0.5">
                    เข้าสู่ระบบ <i class="fa-solid fa-arrow-right-to-bracket ml-2"></i>
                </button>
            </form>
            
            <div class="mt-8 text-center">
                <a href="index.html" class="text-slate-500 hover:text-slate-800 text-sm transition inline-flex items-center gap-1">
                    <i class="fa-solid fa-arrow-left"></i> กลับสู่หน้าหลัก
                </a>
            </div>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            if (u === 'admin' && p === 'admin') {
                errorMsg.classList.add('hidden');
                sessionStorage.setItem('isAdmin', 'true');
                window.location.href = 'admin.html';
            } else {
                errorMsg.classList.remove('hidden');
                // Shake effect
                const formContainer = document.querySelector('.max-w-md');
                formContainer.classList.add('animate-pulse');
                setTimeout(() => formContainer.classList.remove('animate-pulse'), 500);
            }
        }
    </script>
</body>
</html>
