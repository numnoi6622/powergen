<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตรวจสอบสถานะคำสั่งซื้อ - วิศวกรรมไฟฟ้า</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Prompt', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Prompt', sans-serif; }
        .timeline-step.active .timeline-icon { background-color: #2563eb; color: white; border-color: #2563eb; }
        .timeline-step.active .timeline-line { background-color: #2563eb; }
        .timeline-step.completed .timeline-icon { background-color: #10b981; color: white; border-color: #10b981; }
        .timeline-step.completed .timeline-line { background-color: #10b981; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="flex items-center gap-3 text-brand-600 hover:text-brand-700 transition group">
                    <div class="w-10 h-10 rounded-lg bg-brand-50 flex items-center justify-center group-hover:bg-brand-100 transition">
                        <i class="fa-solid fa-arrow-left"></i>
                    </div>
                    <span class="font-bold">กลับหน้าหลัก</span>
                </a>
                <div class="font-bold text-slate-800 text-lg hidden sm:block">
                    ระบบตรวจสอบสถานะพัสดุ
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-3xl mx-auto">
            
            <!-- Header Section -->
            <div class="text-center mb-10">
                <div class="w-20 h-20 bg-brand-100 text-brand-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner text-3xl">
                    <i class="fa-solid fa-box-open"></i>
                </div>
                <h1 class="text-3xl font-bold text-slate-900 mb-4">ตรวจสอบสถานะคำสั่งซื้อ</h1>
                <p class="text-slate-500 max-w-lg mx-auto">
                    กรุณากรอก <span class="font-bold text-slate-700">เบอร์โทรศัพท์</span> หรือ <span class="font-bold text-slate-700">อีเมล</span> ที่ใช้ในการสั่งซื้อ เพื่อตรวจสอบสถานะและหมายเลขพัสดุ
                </p>
            </div>

            <!-- Search Form -->
            <div class="bg-white rounded-2xl shadow-xl border border-slate-100 p-6 md:p-8 mb-8 relative overflow-hidden">
                <form id="searchForm" onsubmit="searchOrder(event)" class="relative z-10">
                    <div class="flex flex-col md:flex-row gap-4">
                        <div class="flex-grow relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                                <i class="fa-solid fa-magnifying-glass"></i>
                            </div>
                            <input type="text" id="searchInput" required class="w-full pl-11 pr-4 py-3.5 rounded-xl border-2 border-slate-200 focus:ring-0 focus:border-brand-500 outline-none transition text-lg bg-slate-50 focus:bg-white" placeholder="เช่น 0812345678 หรือ email@example.com">
                        </div>
                        <button type="submit" id="searchBtn" class="bg-brand-600 hover:bg-brand-700 text-white font-bold py-3.5 px-8 rounded-xl shadow-lg shadow-brand-500/30 transition transform hover:-translate-y-0.5 whitespace-nowrap min-w-[160px]">
                            ตรวจสอบสถานะ
                        </button>
                    </div>
                </form>
            </div>

            <!-- Loading State -->
            <div id="loadingState" class="hidden py-12 text-center">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl text-brand-500 mb-4"></i>
                <p class="text-slate-500 font-medium animate-pulse">กำลังค้นหาข้อมูลของคุณ...</p>
            </div>

            <!-- Not Found State -->
            <div id="notFoundState" class="hidden bg-red-50 border border-red-100 rounded-2xl p-8 text-center">
                <div class="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                    <i class="fa-solid fa-search-minus"></i>
                </div>
                <h3 class="text-xl font-bold text-slate-800 mb-2">ไม่พบข้อมูลคำสั่งซื้อ</h3>
                <p class="text-slate-600">ไม่พบข้อมูลที่ตรงกับเบอร์โทรศัพท์หรืออีเมลที่คุณระบุ กรุณาตรวจสอบความถูกต้องและลองใหม่อีกครั้ง</p>
            </div>

            <!-- Results Container (Can have multiple orders) -->
            <div id="resultsContainer" class="hidden space-y-6">
                <!-- Orders will be injected here -->
            </div>

        </div>
    </main>

    <script>
        // Initialize Supabase Client
        const supabaseUrl = 'https://uawuauxvlymsxieezfdu.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVhd3VhdXh2bHltc3hpZWV6ZmR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMDg0ODIsImV4cCI6MjA5NzU4NDQ4Mn0.zLW9srB-Fqx-PcH4LxVmZByaaVyYtOIaZ5SUq6FZTcc';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        const UI = {
            loading: document.getElementById('loadingState'),
            notFound: document.getElementById('notFoundState'),
            results: document.getElementById('resultsContainer'),
            btn: document.getElementById('searchBtn'),
            input: document.getElementById('searchInput'),
            
            reset() {
                this.loading.classList.add('hidden');
                this.notFound.classList.add('hidden');
                this.results.classList.add('hidden');
                this.results.innerHTML = '';
            },
            showLoading() {
                this.reset();
                this.loading.classList.remove('hidden');
                this.btn.disabled = true;
                this.btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> กำลังค้นหา...';
            },
            hideLoading() {
                this.loading.classList.add('hidden');
                this.btn.disabled = false;
                this.btn.innerHTML = 'ตรวจสอบสถานะ';
            },
            showNotFound() {
                this.reset();
                this.notFound.classList.remove('hidden');
            },
            showResults() {
                this.results.classList.remove('hidden');
            }
        };

        // Format Date to Thai locale
        function formatThaiDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('th-TH', { 
                year: 'numeric', month: 'long', day: 'numeric',
                hour: '2-digit', minute: '2-digit'
            }) + ' น.';
        }

        async function searchOrder(e) {
            e.preventDefault();
            const query = UI.input.value.trim();
            if(!query) return;

            UI.showLoading();

            try {
                // Search by email or phone
                const { data, error } = await supabaseClient
                    .from('book_orders')
                    .select('*')
                    .or(`phone.eq.${query},email.eq.${query}`)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                UI.hideLoading();

                if (!data || data.length === 0) {
                    UI.showNotFound();
                    return;
                }

                renderOrders(data);
                UI.showResults();

            } catch (err) {
                UI.hideLoading();
                alert('เกิดข้อผิดพลาดในการเชื่อมต่อฐานข้อมูล กรุณาลองใหม่อีกครั้ง');
                console.error(err);
            }
        }

        function getStatusDetails(status) {
            const map = {
                'pending': { icon: 'fa-clock', text: 'รอดำเนินการ / ตรวจสอบสลิป', color: 'text-amber-500', step: 1 },
                'processing': { icon: 'fa-box', text: 'กำลังเตรียมจัดส่ง', color: 'text-blue-500', step: 2 },
                'shipped': { icon: 'fa-truck-fast', text: 'อยู่ระหว่างจัดส่ง / รอรับที่คณะ', color: 'text-purple-500', step: 3 },
                'completed': { icon: 'fa-check-circle', text: 'เสร็จสิ้น / รับของแล้ว', color: 'text-green-500', step: 4 },
                'cancelled': { icon: 'fa-times-circle', text: 'ยกเลิก / มีปัญหา', color: 'text-red-500', step: -1 }
            };
            return map[status] || map['pending'];
        }

        function renderOrders(orders) {
            orders.forEach(order => {
                const statusInfo = getStatusDetails(order.status || 'pending');
                const isShipping = order.delivery_method === 'shipping';
                
                // Package Label
                let pkgLabel = order.package;
                if(order.package === 'fullset') pkgLabel = 'หนังสือครบชุด (เล่ม 1 + เล่ม 2)';
                if(order.package === 'vol1') pkgLabel = 'หนังสือเฉพาะเล่ม 1';
                if(order.package === 'vol2') pkgLabel = 'หนังสือเฉพาะเล่ม 2';

                let deliveryText = isShipping ? 'จัดส่งพัสดุถึงบ้าน' : 'รับด้วยตนเองที่คณะ';

                // Render Timeline
                let timelineHtml = '';
                if(statusInfo.step === -1) {
                    // Cancelled
                    timelineHtml = `
                        <div class="bg-red-50 text-red-600 p-4 rounded-xl flex items-center gap-3 border border-red-100">
                            <i class="fa-solid fa-triangle-exclamation text-xl"></i>
                            <div>
                                <div class="font-bold">คำสั่งซื้อถูกยกเลิก</div>
                                <div class="text-sm opacity-80">หากมีข้อสงสัย กรุณาติดต่อผู้ดูแลเพจ/เว็บไซต์</div>
                            </div>
                        </div>
                    `;
                } else {
                    const step1Class = statusInfo.step >= 1 ? 'completed' : '';
                    const step2Class = statusInfo.step >= 2 ? 'completed' : (statusInfo.step === 1 ? 'active' : '');
                    const step3Class = statusInfo.step >= 3 ? 'completed' : (statusInfo.step === 2 ? 'active' : '');
                    const step4Class = statusInfo.step >= 4 ? 'completed' : (statusInfo.step === 3 ? 'active' : '');

                    timelineHtml = `
                    <div class="flex flex-col sm:flex-row justify-between relative mt-8 mb-4 px-4 sm:px-0">
                        <!-- Connecting lines (Hidden on mobile for simplicity, or we make them vertical) -->
                        <div class="hidden sm:block absolute top-5 left-8 right-8 h-1 bg-slate-200 -z-10 rounded-full"></div>
                        
                        <div class="timeline-step ${step1Class} flex sm:flex-col items-center gap-4 sm:gap-2 relative z-0 bg-white sm:bg-transparent py-2 sm:py-0 w-full sm:w-1/4">
                            <div class="timeline-icon w-10 h-10 rounded-full border-2 border-slate-300 bg-white flex items-center justify-center text-slate-400 font-bold transition-colors">1</div>
                            <div class="text-left sm:text-center">
                                <div class="text-sm font-bold text-slate-700">รับคำสั่งซื้อ</div>
                            </div>
                        </div>
                        <div class="timeline-step ${step2Class} flex sm:flex-col items-center gap-4 sm:gap-2 relative z-0 bg-white sm:bg-transparent py-2 sm:py-0 w-full sm:w-1/4">
                            <div class="timeline-icon w-10 h-10 rounded-full border-2 border-slate-300 bg-white flex items-center justify-center text-slate-400 font-bold transition-colors">2</div>
                            <div class="text-left sm:text-center">
                                <div class="text-sm font-bold text-slate-700">เตรียมจัดส่ง</div>
                            </div>
                        </div>
                        <div class="timeline-step ${step3Class} flex sm:flex-col items-center gap-4 sm:gap-2 relative z-0 bg-white sm:bg-transparent py-2 sm:py-0 w-full sm:w-1/4">
                            <div class="timeline-icon w-10 h-10 rounded-full border-2 border-slate-300 bg-white flex items-center justify-center text-slate-400 font-bold transition-colors">3</div>
                            <div class="text-left sm:text-center">
                                <div class="text-sm font-bold text-slate-700">${isShipping ? 'กำลังจัดส่ง' : 'รอรับที่คณะ'}</div>
                            </div>
                        </div>
                        <div class="timeline-step ${step4Class} flex sm:flex-col items-center gap-4 sm:gap-2 relative z-0 bg-white sm:bg-transparent py-2 sm:py-0 w-full sm:w-1/4">
                            <div class="timeline-icon w-10 h-10 rounded-full border-2 border-slate-300 bg-white flex items-center justify-center text-slate-400 font-bold transition-colors"><i class="fa-solid fa-check"></i></div>
                            <div class="text-left sm:text-center">
                                <div class="text-sm font-bold text-slate-700">เสร็จสิ้น</div>
                            </div>
                        </div>
                    </div>
                    `;
                }

                // Tracking Box
                let trackingBoxHtml = '';
                if(order.tracking_number) {
                    trackingBoxHtml = `
                    <div class="bg-blue-50 border border-blue-100 rounded-xl p-5 mt-6 flex flex-col sm:flex-row items-center justify-between gap-4">
                        <div class="flex items-center gap-3 text-blue-800">
                            <i class="fa-solid fa-box-open text-2xl text-blue-500"></i>
                            <div>
                                <div class="text-xs uppercase tracking-wider font-bold opacity-70">หมายเลขพัสดุ (Tracking No.)</div>
                                <div class="text-xl font-black font-mono tracking-widest">${order.tracking_number}</div>
                            </div>
                        </div>
                        <button onclick="navigator.clipboard.writeText('${order.tracking_number}'); alert('คัดลอกเลขพัสดุแล้ว');" class="bg-white hover:bg-slate-50 text-blue-600 border border-blue-200 px-4 py-2 rounded-lg font-medium text-sm transition shadow-sm w-full sm:w-auto">
                            <i class="fa-regular fa-copy mr-1"></i> คัดลอก
                        </button>
                    </div>
                    `;
                }

                const card = document.createElement('div');
                card.className = "bg-white rounded-3xl shadow-lg border border-slate-200 overflow-hidden";
                card.innerHTML = `
                    <div class="border-b border-slate-100 bg-slate-50 p-5 md:px-8 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div>
                            <div class="text-xs text-slate-500 font-bold uppercase tracking-wider mb-1">วันที่สั่งซื้อ</div>
                            <div class="text-slate-800 font-medium"><i class="fa-regular fa-calendar mr-2 text-slate-400"></i>${formatThaiDate(order.created_at)}</div>
                        </div>
                        <div class="bg-white px-4 py-2 rounded-xl shadow-sm border border-slate-200 flex items-center gap-2">
                            <span class="relative flex h-3 w-3">
                              <span class="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 ${statusInfo.color.replace('text-', 'bg-')}"></span>
                              <span class="relative inline-flex rounded-full h-3 w-3 ${statusInfo.color.replace('text-', 'bg-')}"></span>
                            </span>
                            <span class="font-bold ${statusInfo.color}">${statusInfo.text}</span>
                        </div>
                    </div>
                    <div class="p-5 md:p-8">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-2">
                            <div>
                                <div class="text-sm text-slate-500 mb-1">ชื่อลูกค้า</div>
                                <div class="font-bold text-slate-800 text-lg">${order.customer_name}</div>
                            </div>
                            <div>
                                <div class="text-sm text-slate-500 mb-1">รายการสั่งซื้อ</div>
                                <div class="font-medium text-slate-800"><i class="fa-solid fa-book text-brand-500 mr-2"></i>${pkgLabel}</div>
                            </div>
                            <div class="md:col-span-2">
                                <div class="text-sm text-slate-500 mb-1">รูปแบบการรับสินค้า</div>
                                <div class="font-medium text-slate-800 flex items-start gap-2">
                                    <i class="fa-solid ${isShipping ? 'fa-truck-fast text-brand-500' : 'fa-hand-holding-hand text-green-500'} mt-1"></i>
                                    <div>
                                        <div>${deliveryText}</div>
                                        ${isShipping && order.shipping_address ? `<div class="text-sm text-slate-500 mt-1">${order.shipping_address}</div>` : ''}
                                    </div>
                                </div>
                            </div>
                        </div>

                        ${timelineHtml}
                        ${trackingBoxHtml}

                    </div>
                `;
                
                UI.results.appendChild(card);
            });
        }
    </script>
</body>
</html>
